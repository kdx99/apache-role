<VirtualHost *:80>
	ServerName mail.nomorebluescreen.de
	ServerAdmin hostmaster@nomorebluescreen.de

	Include /etc/apache2/conf-available/rewrite-http-to-https.conf

	CustomLog ${APACHE_LOG_DIR}/mail.nomorebluescreen.de-access.log combined
	ErrorLog ${APACHE_LOG_DIR}/mail.nomorebluescreen.de-error.log

	LogLevel warn

</VirtualHost>
