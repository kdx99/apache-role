<VirtualHost *:443>
	ServerName wiki.nomorebluescreen.de
  	Serveralias wiki.nomorebluescreen.de
  	ServerAdmin hostmaster@nomorebluescreen.de
	SSLEngine on
	SSLCertificateFile /var/lib/dehydrated/certs/wiki.nomorebluescreen.de/fullchain.pem
	SSLCertificateKeyFile /var/lib/dehydrated/certs/wiki.nomorebluescreen.de/privkey.pem
	#SSLCertificateCAFile /etc/ssl/certs/ISRG_Root_X1.pem

	Include /etc/apache2/conf-available/ssl-encryption.conf
	
	DocumentRoot /var/lib/mediawiki

	CustomLog ${APACHE_LOG_DIR}/wiki.nomorebluescreen.de-ssl-access.log combined
	ErrorLog ${APACHE_LOG_DIR}/wiki.nomorebluescreen.de-ssl-error.log

</VirtualHost>
